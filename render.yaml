services:
  # Deploy the Node/Express + WebSockets Backend
  - type: web
    name: hashitout-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        value: https://fooddistrinbute.vercel.app

  # Deploy the React Vite Frontend (Optional - you already use Vercel for this)
  - type: web
    name: hashitout-web
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hashitout-api
          envVarKey: RENDER_EXTERNAL_URL
